
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<div id="app-wrapper" style="display:flex; justify-content:center; padding: 1rem 0;">
  <div id="app"></div>
</div>

<script>
const { createApp, ref, computed } = Vue;

const emojis = {
  great: '😄', good: '🙂', neutral: '😐', bad: '😔', terrible: '😣',
  excited: '🤩', tired: '😴', sick: '🤢', happy: '😊', stressed: '😤'
};

const calendarData = {
  1: 'good', 2: 'great', 3: 'neutral', 4: 'good', 5: 'great', 6: 'great', 7: 'happy',
  8: 'tired', 9: 'bad', 10: 'good', 11: 'great', 12: 'excited', 13: 'happy', 14: 'stressed',
  15: 'neutral', 16: 'good', 17: 'bad', 18: 'neutral', 19: 'great', 20: 'happy', 21: 'excited',
  22: 'tired', 23: 'neutral', 24: 'good', 25: 'great', 26: 'happy', 27: 'neutral', 28: 'good',
  29: 'great', 30: 'excited'
};

const feedItems = [
  { id: 1, title: '고단백 닭가슴살 샐러드', calories: 320, protein: 42, carbs: 15, fat: 8, tag: 'AI 분석: 이건걸 먹었군요!', hasReaction: true, img: '🥗' },
  { id: 2, title: '현미밥 + 된장국', calories: 480, protein: 18, carbs: 72, fat: 6, tag: 'AI 분석', hasReaction: true, img: '🍚' },
  { id: 3, title: '오트밀 프로틴 볼', calories: 290, protein: 22, carbs: 38, fat: 9, tag: 'AI 분석', hasReaction: false, img: '🥣' },
  { id: 4, title: '저녁: 연어 스테이크', calories: 520, protein: 48, carbs: 12, fat: 24, tag: 'AI 분석', hasReaction: false, img: '🐟' }
];

const groups = [
  { id: 1, name: '다이어트 챌린지', members: 12, shared: true },
  { id: 2, name: '헬스장 친구들', members: 5, shared: false },
  { id: 3, name: '직장인 건강관리', members: 8, shared: true }
];

const chatMessages = [
  { id: 1, sender: '김민지', text: '오늘 점심 뭐 먹었어요? 🍱', time: '오후 1:23', isMine: false },
  { id: 2, sender: '나', text: '닭가슴살 샐러드 먹었어요! 단백질 42g!', time: '오후 1:25', isMine: true },
  { id: 3, sender: '박지훈', text: '대박 👏 저는 오늘 현미밥 먹었는데', time: '오후 1:28', isMine: false },
  { id: 4, sender: '나', text: '좋아요~ 탄수화물 잘 챙기셨네요', time: '오후 1:30', isMine: true },
  { id: 5, reaction: '🔥', sender: '김민지', text: '나도 내일부터 샐러드 도전!', time: '오후 1:32', isMine: false }
];

const App = {
  setup() {
    const currentScreen = ref('main');
    const mainTab = ref('feed');
    const showCreateGroup = ref(false);
    const groupName = ref('');
    const memberCount = ref('');
    const chatInput = ref('');
    const selectedDay = ref(13);

    const goTo = (screen) => { currentScreen.value = screen; };
    const goBack = () => {
      if (showCreateGroup.value) { showCreateGroup.value = false; return; }
      currentScreen.value = 'main';
    };

    const totalProtein = computed(() => feedItems.reduce((a, b) => a + b.protein, 0));
    const totalCalories = computed(() => feedItems.reduce((a, b) => a + b.calories, 0));

    const getDayEmoji = (day) => {
      const mood = calendarData[day];
      return mood ? emojis[mood] : '';
    };

    return {
      currentScreen, mainTab, showCreateGroup, groupName, memberCount,
      chatInput, selectedDay, goTo, goBack, feedItems, groups, chatMessages,
      calendarData, emojis, getDayEmoji, totalProtein, totalCalories
    };
  },
  template: `
    <div style="width:360px; background:#fff; border-radius:40px; overflow:hidden; border:8px solid #1a1a1a; min-height:720px; position:relative; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
      
      <div style="height:44px; background:#1a1a1a; display:flex; align-items:center; justify-content:center;">
        <div style="width:120px; height:28px; background:#1a1a1a; border-radius:14px; border:2px solid #333; display:flex; align-items:center; justify-content:center;">
          <div style="width:60px; height:16px; background:#111; border-radius:8px;"></div>
        </div>
      </div>

      <div style="height:620px; overflow:hidden; position:relative;">

        <!-- 메인 화면 -->
        <transition name="slide">
        <div v-if="currentScreen === 'main'" style="height:100%; display:flex; flex-direction:column;">
          <!-- 상단 헤더 -->
          <div style="padding:16px 20px 12px; background:#fff; border-bottom: 0.5px solid var(--color-border-tertiary);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
              <div>
                <div style="font-size:11px; color:var(--color-text-secondary);">오늘 날짜/시간</div>
                <div style="font-size:13px; font-weight:500; color:var(--color-text-primary);">Apr 1, 2025 &nbsp; 9:41 AM</div>
              </div>
              <div style="display:flex; gap:8px;">
                <button @click="mainTab='feed'" :style="{background: mainTab==='feed' ? '#FF6B6B' : 'transparent', color: mainTab==='feed' ? '#fff' : 'var(--color-text-secondary)', border:'0.5px solid', borderColor: mainTab==='feed' ? '#FF6B6B' : 'var(--color-border-tertiary)', padding:'4px 10px', borderRadius:'12px', fontSize:'12px', cursor:'pointer'}">달력</button>
                <button @click="goTo('chat')" style="background:transparent; color:var(--color-text-secondary); border:0.5px solid var(--color-border-tertiary); padding:4px 10px; border-radius:12px; font-size:12px; cursor:pointer;">채팅</button>
              </div>
            </div>
            <div style="background:#FFF5F5; border-radius:10px; padding:8px 12px;">
              <div style="font-size:11px; color:#FF6B6B; font-weight:500; margin-bottom:2px;">목표 (단백질)</div>
              <div style="display:flex; align-items:center; gap:8px;">
                <div style="flex:1; height:6px; background:#FFE0E0; border-radius:3px; overflow:hidden;">
                  <div :style="{width: Math.min(totalProtein/150*100, 100)+'%'}" style="height:100%; background:#FF6B6B; border-radius:3px; transition:width 0.5s;"></div>
                </div>
                <span style="font-size:12px; font-weight:500; color:#FF6B6B;">{{totalProtein}}g / 150g</span>
              </div>
            </div>
          </div>

          <!-- 피드 -->
          <div style="flex:1; overflow-y:auto; padding:12px 16px;">
            <div v-for="item in feedItems" :key="item.id" style="background:#fff; border:0.5px solid var(--color-border-tertiary); border-radius:14px; margin-bottom:10px; overflow:hidden;">
              <div style="background:#f7f7f7; height:80px; display:flex; align-items:center; justify-content:center; font-size:40px;">{{item.img}}</div>
              <div style="padding:10px 12px;">
                <div style="font-size:13px; font-weight:500; color:var(--color-text-primary); margin-bottom:4px;">{{item.title}}</div>
                <div style="display:flex; gap:8px; margin-bottom:6px;">
                  <span style="font-size:11px; color:var(--color-text-secondary);">🔥 {{item.calories}}kcal</span>
                  <span style="font-size:11px; color:var(--color-text-secondary);">💪 {{item.protein}}g</span>
                  <span style="font-size:11px; color:var(--color-text-secondary);">🌾 {{item.carbs}}g</span>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                  <span style="font-size:11px; color:#FF6B6B; font-weight:500;">{{item.tag}}</span>
                  <button style="font-size:11px; background:#FFF5F5; color:#FF6B6B; border:0.5px solid #FFCDD2; padding:3px 8px; border-radius:8px; cursor:pointer;">리액션</button>
                </div>
              </div>
            </div>
          </div>

          <!-- 하단 탭 -->
          <div style="border-top:0.5px solid var(--color-border-tertiary); padding:10px 0; display:flex; justify-content:space-around; background:#fff;">
            <button @click="currentScreen='main'" style="display:flex; flex-direction:column; align-items:center; gap:2px; background:transparent; border:none; cursor:pointer; color:#FF6B6B;">
              <i class="ti ti-home" style="font-size:20px;"></i>
              <span style="font-size:10px;">홈</span>
            </button>
            <button @click="goTo('calendar')" style="display:flex; flex-direction:column; align-items:center; gap:2px; background:transparent; border:none; cursor:pointer; color:var(--color-text-secondary);">
              <i class="ti ti-calendar" style="font-size:20px;"></i>
              <span style="font-size:10px;">달력</span>
            </button>
            <button @click="goTo('groups')" style="display:flex; flex-direction:column; align-items:center; gap:2px; background:transparent; border:none; cursor:pointer; color:var(--color-text-secondary);">
              <i class="ti ti-users" style="font-size:20px;"></i>
              <span style="font-size:10px;">그룹</span>
            </button>
            <button @click="goTo('chat')" style="display:flex; flex-direction:column; align-items:center; gap:2px; background:transparent; border:none; cursor:pointer; color:var(--color-text-secondary);">
              <i class="ti ti-message-circle" style="font-size:20px;"></i>
              <span style="font-size:10px;">채팅</span>
            </button>
          </div>
        </div>
        </transition>

        <!-- 달력 화면 -->
        <div v-if="currentScreen === 'calendar'" style="height:100%; display:flex; flex-direction:column;">
          <div style="padding:16px 20px 12px; border-bottom:0.5px solid var(--color-border-tertiary); display:flex; align-items:center; gap:12px;">
            <button @click="goBack()" style="background:transparent; border:none; cursor:pointer; color:var(--color-text-primary);"><i class="ti ti-arrow-left" style="font-size:20px;"></i></button>
            <div style="flex:1;">
              <div style="font-size:11px; color:#FF6B6B; font-weight:500;">AI 분석 (한달 분석)</div>
              <div style="font-size:15px; font-weight:500;">NOV, 2022</div>
            </div>
            <button style="background:#FFF5F5; color:#FF6B6B; border:0.5px solid #FFCDD2; padding:4px 10px; border-radius:10px; font-size:11px; cursor:pointer;">분석 상세 보기 →</button>
          </div>

          <div style="padding:12px 16px; flex:1; overflow-y:auto;">
            <div style="display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:4px;">
              <div v-for="d in ['M','T','W','T','F','S','S']" :key="d" style="text-align:center; font-size:11px; color:var(--color-text-secondary); padding:4px 0;">{{d}}</div>
            </div>
            <div style="display:grid; grid-template-columns:repeat(7,1fr); gap:2px;">
              <div style=""></div>
              <div v-for="day in 30" :key="day"
                @click="selectedDay = day"
                :style="{background: selectedDay===day ? '#FF6B6B' : 'transparent', borderRadius:'50%', width:'38px', height:'38px', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', cursor:'pointer', margin:'0 auto'}">
                <span :style="{fontSize:'18px', lineHeight:'1'}">{{getDayEmoji(day) || ''}}</span>
                <span :style="{fontSize:'9px', color: selectedDay===day ? '#fff' : 'var(--color-text-secondary)'}">{{day}}</span>
              </div>
            </div>

            <div style="margin-top:16px; background:#FFF5F5; border-radius:14px; padding:14px;">
              <div style="font-size:11px; color:#FF6B6B; font-weight:500; margin-bottom:8px;">AI 분석 (하루 분석) — {{selectedDay}}일</div>
              <div style="font-size:13px; color:var(--color-text-primary); line-height:1.6;">
                오늘 {{getDayEmoji(selectedDay)}} 컨디션이 {{calendarData[selectedDay] === 'great' || calendarData[selectedDay] === 'excited' ? '매우 좋았습니다!' : calendarData[selectedDay] === 'good' || calendarData[selectedDay] === 'happy' ? '좋았습니다.' : '평범했습니다.'}}
                단백질 섭취가 목표의 87%를 달성했으며 칼로리 균형이 잘 맞춰졌어요.
              </div>
            </div>
          </div>

          <div style="border-top:0.5px solid var(--color-border-tertiary); padding:10px 0; display:flex; justify-content:space-around; background:#fff;">
            <button @click="goTo('main')" style="display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;cursor:pointer;color:var(--color-text-secondary);"><i class="ti ti-home" style="font-size:20px;"></i><span style="font-size:10px;">홈</span></button>
            <button style="display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;cursor:pointer;color:#FF6B6B;"><i class="ti ti-calendar" style="font-size:20px;"></i><span style="font-size:10px;">달력</span></button>
            <button @click="goTo('groups')" style="display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;cursor:pointer;color:var(--color-text-secondary);"><i class="ti ti-users" style="font-size:20px;"></i><span style="font-size:10px;">그룹</span></button>
            <button @click="goTo('chat')" style="display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;cursor:pointer;color:var(--color-text-secondary);"><i class="ti ti-message-circle" style="font-size:20px;"></i><span style="font-size:10px;">채팅</span></button>
          </div>
        </div>

        <!-- 그룹 화면 -->
        <div v-if="currentScreen === 'groups' && !showCreateGroup" style="height:100%; display:flex; flex-direction:column;">
          <div style="padding:16px 20px 12px; border-bottom:0.5px solid var(--color-border-tertiary); display:flex; align-items:center; justify-content:space-between;">
            <div style="font-size:17px; font-weight:500; color:var(--color-text-primary);">암암</div>
            <button @click="showCreateGroup=true" style="width:32px;height:32px;border-radius:50%;background:#FF6B6B;border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center; line-height:1;">+</button>
          </div>

          <div style="flex:1; overflow-y:auto; padding:16px;">
            <div v-for="group in groups" :key="group.id" style="display:flex; align-items:center; background:#fff; border:0.5px solid var(--color-border-tertiary); border-radius:14px; padding:14px; margin-bottom:10px;">
              <div style="width:40px; height:40px; border-radius:50%; background:#FFE0E0; display:flex; align-items:center; justify-content:center; font-size:18px; margin-right:12px;">👥</div>
              <div style="flex:1;">
                <div style="font-size:14px; font-weight:500; color:var(--color-text-primary);">{{group.name}}</div>
                <div style="font-size:12px; color:var(--color-text-secondary);">{{group.members}}명</div>
              </div>
              <button style="background:#FFF5F5; color:#FF6B6B; border:0.5px solid #FFCDD2; padding:5px 10px; border-radius:10px; font-size:12px; cursor:pointer;">공유하기</button>
            </div>
          </div>

          <div style="border-top:0.5px solid var(--color-border-tertiary); padding:10px 0; display:flex; justify-content:space-around; background:#fff;">
            <button @click="goTo('main')" style="display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;cursor:pointer;color:var(--color-text-secondary);"><i class="ti ti-home" style="font-size:20px;"></i><span style="font-size:10px;">홈</span></button>
            <button @click="goTo('calendar')" style="display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;cursor:pointer;color:var(--color-text-secondary);"><i class="ti ti-calendar" style="font-size:20px;"></i><span style="font-size:10px;">달력</span></button>
            <button style="display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;cursor:pointer;color:#FF6B6B;"><i class="ti ti-users" style="font-size:20px;"></i><span style="font-size:10px;">그룹</span></button>
            <button @click="goTo('chat')" style="display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;cursor:pointer;color:var(--color-text-secondary);"><i class="ti ti-message-circle" style="font-size:20px;"></i><span style="font-size:10px;">채팅</span></button>
          </div>
        </div>

        <!-- 그룹 만들기 -->
        <div v-if="currentScreen === 'groups' && showCreateGroup" style="height:100%; display:flex; flex-direction:column;">
          <div style="padding:16px 20px 12px; border-bottom:0.5px solid var(--color-border-tertiary); display:flex; align-items:center; gap:12px;">
            <button @click="showCreateGroup=false" style="background:transparent; border:none; cursor:pointer; color:var(--color-text-primary);"><i class="ti ti-arrow-left" style="font-size:20px;"></i></button>
            <div style="font-size:17px; font-weight:500;">그룹 만들기</div>
          </div>

          <div style="flex:1; padding:24px 20px; display:flex; flex-direction:column; gap:16px;">
            <div>
              <label style="font-size:13px; color:var(--color-text-secondary); display:block; margin-bottom:8px;">그룹 이름</label>
              <input v-model="groupName" placeholder="그룹 이름을 입력하세요" style="width:100%; padding:12px 14px; border:0.5px solid var(--color-border-secondary); border-radius:12px; font-size:14px; box-sizing:border-box; background:var(--color-background-secondary);" />
            </div>
            <div>
              <label style="font-size:13px; color:var(--color-text-secondary); display:block; margin-bottom:8px;">인원수 선택</label>
              <select v-model="memberCount" style="width:100%; padding:12px 14px; border:0.5px solid var(--color-border-secondary); border-radius:12px; font-size:14px; box-sizing:border-box; background:var(--color-background-secondary);">
                <option value="">인원수 선택</option>
                <option v-for="n in [2,3,4,5,6,7,8,9,10,15,20]" :key="n">{{n}}명</option>
              </select>
            </div>
            <div style="margin-top:auto;">
              <button @click="showCreateGroup=false" style="width:100%; padding:14px; background:#FF6B6B; color:#fff; border:none; border-radius:14px; font-size:15px; font-weight:500; cursor:pointer;">공유하기</button>
            </div>
          </div>
        </div>

        <!-- 채팅 화면 -->
        <div v-if="currentScreen === 'chat'" style="height:100%; display:flex; flex-direction:column;">
          <div style="padding:16px 20px 12px; border-bottom:0.5px solid var(--color-border-tertiary); display:flex; align-items:center; gap:12px;">
            <button @click="goBack()" style="background:transparent; border:none; cursor:pointer; color:var(--color-text-primary);"><i class="ti ti-arrow-left" style="font-size:20px;"></i></button>
            <div style="width:36px; height:36px; border-radius:50%; background:#FFE0E0; display:flex; align-items:center; justify-content:center; font-size:16px;">👥</div>
            <div>
              <div style="font-size:15px; font-weight:500; color:var(--color-text-primary);">다이어트 챌린지</div>
              <div style="font-size:12px; color:var(--color-text-secondary);">12명 참여중</div>
            </div>
          </div>

          <div style="flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px;">
            <div v-for="msg in chatMessages" :key="msg.id" :style="{display:'flex', flexDirection: msg.isMine ? 'row-reverse' : 'row', alignItems:'flex-end', gap:'8px'}">
              <div v-if="!msg.isMine" style="width:30px; height:30px; border-radius:50%; background:#f0f0f0; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0;">😊</div>
              <div :style="{maxWidth:'70%'}">
                <div v-if="!msg.isMine" style="font-size:11px; color:var(--color-text-secondary); margin-bottom:3px; padding-left:4px;">{{msg.sender}}</div>
                <div :style="{background: msg.isMine ? '#FF6B6B' : 'var(--color-background-secondary)', color: msg.isMine ? '#fff' : 'var(--color-text-primary)', padding:'9px 12px', borderRadius: msg.isMine ? '14px 14px 4px 14px' : '14px 14px 14px 4px', fontSize:'13px', lineHeight:'1.5'}">
                  <span v-if="msg.reaction" style="font-size:16px;">{{msg.reaction}} </span>{{msg.text}}
                </div>
                <div :style="{fontSize:'10px', color:'var(--color-text-secondary)', marginTop:'3px', textAlign: msg.isMine ? 'right' : 'left', padding:'0 4px'}">{{msg.time}}</div>
              </div>
            </div>
          </div>

          <div style="padding:10px 12px; border-top:0.5px solid var(--color-border-tertiary); display:flex; gap:8px; background:#fff;">
            <input v-model="chatInput" placeholder="메시지를 입력하세요..." style="flex:1; padding:10px 14px; border:0.5px solid var(--color-border-secondary); border-radius:20px; font-size:13px; background:var(--color-background-secondary);" />
            <button style="width:38px; height:38px; border-radius:50%; background:#FF6B6B; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;">
              <i class="ti ti-send" style="font-size:16px; color:#fff;"></i>
            </button>
          </div>
        </div>

      </div>

      <div style="height:20px; background:#1a1a1a; display:flex; align-items:center; justify-content:center;">
        <div style="width:100px; height:4px; background:#444; border-radius:2px;"></div>
      </div>
    </div>
  `
};

createApp(App).mount('#app');
</script>

<style>
* { box-sizing: border-box; font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; }
button { font-family: inherit; }
input, select { font-family: inherit; outline: none; }
input:focus, select:focus { border-color: #FF6B6B !important; }
::-webkit-scrollbar { width: 0; }
</style>
